<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0156D3">
<title>MenteViva · Metodo di Studio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blu:#0156D3;--blud:#0142A6;--ciano:#57D6FF;--azz:#C8E1FF;--azzl:#EAF3FF;
  --g:#1EA85B;--gl:#E7F7EE;--y:#F2A63B;--yl:#FEF3E2;--r:#E4523B;--rl:#FCEDEA;
  --ink:#0E1B33;--body:#41506B;--muted:#7A89A6;--line:#E3ECFA;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
html,body{height:100%;background:#fff;font-family:'Poppins',sans-serif;color:var(--ink);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none;color:inherit}
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;padding-top:var(--st)}
.screen.active{display:flex}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.blob{position:absolute;z-index:0;pointer-events:none}
.blob.tr{top:-90px;right:-80px;width:280px;opacity:.9}
.blob.bl{bottom:-110px;left:-90px;width:300px;opacity:.75}

/* HOME */
#s-home .scroll{position:relative;z-index:1;padding:calc(28px + var(--st)) 22px calc(30px + var(--sb))}
.home-head{text-align:center;margin-bottom:20px}
.brainmark{height:56px;width:auto;margin:0 auto 8px;display:block}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:2.5px;color:var(--blu);text-transform:uppercase}
.h1{font-size:34px;font-weight:900;line-height:1.05;letter-spacing:-.5px;margin:6px 0 4px}
.h1 .lite{color:var(--blu)}
.h-sub{font-size:14px;color:var(--muted);font-weight:500}
.home-hero{display:block;width:100%;max-width:440px;margin:6px auto 22px;border-radius:20px}
.panel{max-width:520px;margin:0 auto}
.field{margin-bottom:20px}
.field-lbl{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:9px;padding-left:2px}
.pills{display:flex;gap:9px}
.pill{flex:1;padding:13px 8px;border-radius:14px;border:1.5px solid var(--line);background:#fff;font-weight:600;font-size:14px;color:var(--body);transition:.15s;text-align:center;line-height:1.25}
.pill small{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-top:2px}
.pill.on{border-color:var(--blu);background:var(--blu);color:#fff;box-shadow:0 8px 20px rgba(1,86,211,.26)}
.pill.on small{color:rgba(255,255,255,.85)}
.lessons-lbl{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin:26px 0 12px;padding-left:2px;display:flex;justify-content:space-between}
.lessons-lbl span{color:var(--blu)}
.lesson{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:13px 15px;margin-bottom:10px;transition:.15s}
.lesson.ready{cursor:pointer}
.lesson.ready:active{transform:scale(.99)}
.lesson.ready:hover{border-color:var(--azz);box-shadow:0 8px 22px rgba(1,86,211,.10)}
.lesson.soon{opacity:.6}
.l-num{width:34px;height:34px;flex-shrink:0;border-radius:10px;background:var(--azzl);color:var(--blu);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.lesson.ready .l-num{background:var(--blu);color:#fff}
.l-txt{flex:1;min-width:0}
.l-title{font-size:15px;font-weight:700;line-height:1.25}
.l-sub{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:1px}
.l-tag{font-size:11px;font-weight:700;flex-shrink:0}
.l-tag.play{color:var(--blu)}
.l-tag.soon{color:var(--muted)}

/* LESSON */
#s-lesson{background:#fff}
.lbar{position:relative;z-index:2;display:flex;align-items:center;gap:12px;padding:12px 18px;flex-shrink:0}
.lbar .bm{height:24px;width:auto;max-width:44px;object-fit:contain;flex-shrink:0}
.lbar .bt{flex:1;font-size:13.5px;font-weight:700;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbar .bt em{color:var(--muted);font-weight:600;font-style:normal}
.lbar .bx{font-size:12px;font-weight:700;color:var(--muted);background:var(--azzl);border-radius:20px;padding:5px 11px;flex-shrink:0}
.pbar{height:4px;background:var(--line);flex-shrink:0;position:relative;z-index:2}
.pbar>div{height:100%;background:linear-gradient(90deg,var(--blu),var(--ciano));width:0;transition:width .4s cubic-bezier(.4,0,.2,1)}
.stage{flex:1;min-height:0;position:relative;z-index:1;overflow:hidden}
.slidebox{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 24px 20px}
@media(min-width:640px){.slidebox{padding:34px 15% 24px}}
.slidebox.in{animation:slidein .34s cubic-bezier(.22,1,.36,1)}
@keyframes slidein{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
.hero{width:100%;aspect-ratio:16/9;border-radius:18px;object-fit:cover;margin:16px 0 4px;display:none}
.kicker{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--blu);text-transform:uppercase;margin-bottom:12px}
.kicker .kdot{width:26px;height:26px;border-radius:8px;background:var(--azzl);display:flex;align-items:center;justify-content:center;font-size:15px}
.title{font-size:27px;font-weight:900;line-height:1.12;letter-spacing:-.4px;margin-bottom:14px}
.body{font-size:16px;line-height:1.62;color:var(--body);font-weight:400}
.body p{margin-bottom:11px}
.body strong{color:var(--ink);font-weight:700}
.body em{color:var(--blu);font-style:normal;font-weight:600}
.hl{display:block;background:var(--azzl);border-left:3px solid var(--blu);border-radius:0 14px 14px 0;padding:13px 16px;margin:14px 0;font-size:15px;line-height:1.55;font-weight:500;color:var(--ink)}
.hl.g{background:var(--gl);border-color:var(--g)}
.hl.y{background:var(--yl);border-color:var(--y)}
.hl.r{background:var(--rl);border-color:var(--r)}
.q{margin-top:20px;border-top:1px solid var(--line);padding-top:18px}
.q-t{font-size:15px;font-weight:700;margin-bottom:13px;color:var(--ink)}
.ans{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:9px;font-size:15px;font-weight:500;color:var(--body);transition:.14s}
.ans:active{transform:scale(.995)}
.ans.sel{border-color:var(--blu);background:var(--azzl);color:var(--blu);font-weight:600}
.nav{position:relative;z-index:2;display:flex;gap:11px;padding:14px 18px calc(16px + var(--sb));flex-shrink:0}
.nav button{padding:15px;border-radius:14px;font-size:16px;font-weight:700;transition:transform .12s}
.nav button:active{transform:scale(.97)}
.nav .prev{flex:0 0 56px;background:#fff;border:1.5px solid var(--line);color:var(--muted);font-size:18px}
.nav .next{flex:1;background:var(--blu);color:#fff;box-shadow:0 10px 24px rgba(1,86,211,.28)}
.nav .next.lock{background:var(--line);color:var(--muted);box-shadow:none}
.pm-leg{display:flex;gap:10px;margin:16px 0}
.pm-c{flex:1;border-radius:13px;padding:11px;font-size:13px;font-weight:700;text-align:center;border:1.5px solid}
.pm-c.p{border-color:var(--blu);background:var(--azzl);color:var(--blu)}
.pm-c.m{border-color:var(--r);background:var(--rl);color:var(--r)}
.pm-score{text-align:center;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px}
.pm-item{font-size:17px;font-weight:600;text-align:center;padding:22px 12px;line-height:1.4;color:var(--ink)}
.pm-btns{display:flex;gap:10px}
.pm-btns button{flex:1;padding:15px;border-radius:13px;font-size:15px;font-weight:700;border:1.5px solid}
.pm-btns .bp{border-color:var(--blu);color:var(--blu);background:#fff}
.pm-btns .bm{border-color:var(--r);color:var(--r);background:#fff}
.pm-fb{text-align:center;font-size:15px;font-weight:700;min-height:22px;margin-top:12px}
.done{width:78px;height:78px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px}
.recap{list-style:none}
.recap li{background:var(--azzl);border-radius:12px;padding:11px 15px;margin-bottom:8px;font-size:15px;line-height:1.4;font-weight:500}
.recap b{color:var(--blu);font-weight:700}
@media(prefers-reduced-motion:reduce){.slidebox.in{animation:none}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <svg class="blob tr" viewBox="0 0 200 200"><path fill="#C8E1FF" d="M46.5,-59.2C59.3,-49.6,68.1,-34.6,71.6,-18.5C75.1,-2.4,73.3,14.9,65.8,29.1C58.3,43.3,45.1,54.5,30.3,61.6C15.5,68.7,-0.9,71.7,-16.7,68.2C-32.5,64.7,-47.7,54.7,-57.8,41C-67.9,27.3,-72.9,9.9,-70.6,-6.4C-68.3,-22.7,-58.7,-37.9,-46,-47.8C-33.3,-57.7,-17.6,-62.3,-0.5,-61.7C16.7,-61.1,33.7,-68.8,46.5,-59.2Z" transform="translate(100 100)"/></svg>
  <svg class="blob bl" viewBox="0 0 200 200"><path fill="#EAF3FF" d="M42.6,-56.7C55,-47.6,64.2,-34.3,68.3,-19.4C72.4,-4.5,71.4,12,64.9,25.9C58.4,39.8,46.4,51.1,32.5,58.6C18.6,66.1,2.8,69.8,-13.6,68.1C-30,66.4,-47,59.3,-57.9,46.7C-68.8,34.1,-73.6,16,-72.3,-1.2C-71,-18.4,-63.6,-34.7,-52,-44.9C-40.4,-55.1,-24.6,-59.2,-8.4,-60.3C7.8,-61.4,15.6,-59.5,42.6,-56.7Z" transform="translate(100 100)"/></svg>

<script>
let PERC='A',GEN='m',LVL='sup',idx=0,DECK=[],answered={},curLesson='L1';

};

};
function gz(t){return t.replace(/\[\[([^\|\]]*)\|([^\]]*)\]\]/g,(m,a,b)=>GEN==='m'?a:b);}

const CONTENT={
 sup:[
  {emoji:"🎯",img:"01-domanda.png",kick:"Il punto di partenza",title:"Una domanda per cominciare",
   body:`<p>Quante volte oggi hai aperto il telefono senza un motivo preciso?</p>
   <span class="hl r">Cinque? Venti? Cinquanta? Non è una critica: è il punto di partenza. Tra poco capirai <strong>perché lo fai</strong> e smetterai di sentirti [[sbagliato|sbagliata]] per questo.</span>`,
   q:{t:"La tua stima onesta di oggi:",a:["Meno di 10 volte","10–30 volte","30–50 volte","Più di 50"]}},
  {emoji:"🧠",img:"02-cervello.png",kick:"La macchina",title:"Lo strumento più potente che hai",
   body:`<p>Il tuo cervello è lo strumento più avanzato che esiste. Come ogni strumento, funziona bene solo se sai come usarlo.</p>
   <span class="hl y">Chi va bene a scuola non è più intelligente di te. Ha solo imparato a <strong>usare la macchina nel modo giusto</strong>. Non è una questione di intelligenza: è una questione di metodo.</span>
   <p>E quasi nessuno insegna come farlo. <strong>Fino ad oggi.</strong></p>`},
  {emoji:"🧭",img:"03-pilota.png",kick:"Sistema 1",title:"Il Pilota",
   body:`<p>Nel tuo cervello ci sono due sistemi in costante competizione. Il primo è il <strong>Pilota</strong>: razionale e consapevole.</p>
   <span class="hl">✅ Adesso studio, i social li vedo dopo<br>✅ Finisco questo argomento, poi mi fermo<br>✅ Sa aspettare, pianificare, valutare le conseguenze</span>

  {emoji:"⚡",img:"04-motore.png",kick:"Sistema 2",title:"Il Motore",
   body:`<p>Il secondo sistema è il <strong>Motore</strong>: emotivo, velocissimo, inesauribile.</p>
   <span class="hl r">❌ Solo un altro video<br>❌ Controllo i messaggi e poi studio<br>❌ Vuole soddisfazione immediata. Ora, non domani.</span>
   <p>Il Motore non è il tuo nemico, è parte di te. Ma se non lo conosci, <strong>decide lui al posto tuo</strong>.</p>`,
   q:{t:"Nella tua giornata di ieri, chi ha vinto di più?",a:["Il Pilota 🧭","Il Motore ⚡","Più o meno pari","Dipende dalla situazione"]}},
  {emoji:"🧪",img:"05-dopamina.png",kick:"Il carburante",title:"La dopamina",
   body:`<p>Perché il Motore è così forte? Il suo carburante è la <strong>dopamina</strong>.</p>

   q:{t:"Ti è mai capitato di aprire un social per due minuti e ritrovarti lì 40 minuti dopo?",a:["Sempre","Spesso","Qualche volta","Raramente"]}},
  {emoji:"⚖️",img:"06-guerra.png",kick:"Veloce vs lenta",title:"Due tipi di dopamina",
   body:`<p>Non tutta la dopamina è uguale. Ce ne sono <strong>due tipi</strong>, e la differenza cambia tutto.</p>
   <span class="hl r"><strong>⚡ Dopamina veloce</strong><br>Arriva subito e sparisce subito. Scroll infinito, notifiche calibrate, like a sorpresa: non è un caso, è costruito apposta per dartene una dose ogni pochi secondi. Ti lascia sempre con la voglia di ancora.</span>
   <span class="hl g"><strong>🌱 Dopamina lenta</strong><br>Arriva dopo, non subito. È quella dello studio, di un obiettivo raggiunto, di aver capito qualcosa di difficile. Costa fatica, ma dura di più e porta soddisfazione vera.</span>
   <p>Il cervello, lasciato solo, sceglie sempre la veloce. <em>A meno che tu non abbia un metodo.</em></p>`},
  {emoji:"🔋",img:"07-batteria.png",kick:"L'energia",title:"La batteria della volontà",
   body:`<p>La forza di volontà non è una qualità fissa: è una <strong>batteria</strong>.</p>
   <span class="hl">Si ricarica dormendo. Si scarica durante il giorno. Ogni decisione, ogni tentazione a cui resisti, consuma un po' di carica.</span>

   q:{t:"Di solito quando cerchi di studiare?",a:["Mattino o primo pomeriggio 💪","Tardo pomeriggio","La sera dopo le 21","Quando capita"]}},
  {emoji:"🎯",img:"08-nonseiproblema.png",kick:"La verità",title:"Non sei tu il problema",
   body:`<p>Oggi hai capito una cosa importante.</p>
   <span class="hl g">Non sei [[pigro|pigra]]. Non sei [[sbagliato|sbagliata]]. Non sei quello "che non è [[portato|portata]] per lo studio". Hai un cervello normale: due sistemi in lotta, una batteria che si scarica e app progettate per tenerti [[incollato|incollata]] allo schermo.</span>
   <p>La differenza la fa <strong>sapere come funziona la macchina</strong>. Ed è quello che stai imparando.</p>`,
   q:{t:"Come ti senti rispetto a quello che hai capito?",a:["Finalmente ha senso","Interessante, voglio saperne di più","Già lo sospettavo","Devo pensarci su"]}},
  {emoji:"📊",img:"09-sfida.png",kick:"La sfida",title:"La tua sfida della settimana",
   body:`<p>Un'azione concreta, piccola, da fare già oggi.</p>
   <span class="hl"><strong>Metti il telefono fuori dalla stanza prima di iniziare a studiare.</strong> Non [[silenzioso|silenzioso]]: proprio fuori.</span>

  {type:"game"},
  {type:"recap",emoji:"🎉",title:"Ottimo lavoro!",
   items:["🧭 <b>Pilota</b> = sistema razionale, si stanca",

function selClick(id,fn){
  document.getElementById(id).addEventListener('click',e=>{
    const b=e.target.closest('.pill'); if(!b)return;
    document.querySelectorAll('#'+id+' .pill').forEach(x=>x.classList.toggle('on',x===b));
    fn(b.dataset.v);
  });
}
selClick('sel-perc',v=>{PERC=v;renderLessonList();});
selClick('sel-gen',v=>{GEN=v;});
selClick('sel-lvl',v=>{LVL=v;});

function renderLessonList(){
  const p=PERCORSI[PERC];
  document.getElementById('perc-count').textContent=p.lessons.length+' lezioni';
  document.getElementById('lesson-list').innerHTML=p.lessons.map((id,i)=>{
    const L=CATALOG[id],n=i+1,rd=!!L.ready;
    return `<div class="lesson ${rd?'ready':'soon'}" ${rd?`onclick="openLesson('${id}',${n})"`:''}>
      <div class="l-num">${rd?n:'🔒'}</div>
      <div class="l-txt"><div class="l-title">${L.t}</div><div class="l-sub">${L.s}</div></div>
      <div class="l-tag ${rd?'play':'soon'}">${rd?'Apri →':'In arrivo'}</div></div>`;
  }).join('');
}

function openLesson(id,num){
  curLesson=id;DECK=CONTENT[LVL];idx=0;answered={};
  document.getElementById('lbar-title').innerHTML=`Lezione ${num} <em>· ${CATALOG[id].t}</em>`;
  document.getElementById('s-home').classList.remove('active');
  document.getElementById('s-lesson').classList.add('active');
  render();
}
function goHome(){
  document.getElementById('s-lesson').classList.remove('active');
  document.getElementById('s-home').classList.add('active');
}

function render(){
  const s=DECK[idx],el=document.getElementById('slide');
  document.getElementById('prog').style.width=((idx+1)/DECK.length*100)+'%';
  document.getElementById('lbar-step').textContent=(idx+1)+'/'+DECK.length;
  el.classList.remove('in');void el.offsetWidth;el.classList.add('in');el.scrollTop=0;
  if(s.type==='game'){renderGame(el);updateNav();return;}
  if(s.type==='recap'){renderRecap(el,s);updateNav();return;}
  const img=s.img?`<img class="hero" src="img/${s.img}" alt="" onload="this.style.display='block'">`:'';
  const kick=s.kick?`<div class="kicker"><span class="kdot">${s.emoji}</span>${s.kick}</div>`:'';
  let q='';
  if(s.q){q=`<div class="q"><div class="q-t">${gz(s.q.t)}</div>`
     +s.q.a.map(a=>`<button class="ans" onclick="pickReflect(this)">${gz(a)}</button>`).join('')+`</div>`;}
  el.innerHTML=kick+`<div class="title">${gz(s.title)}</div><div class="body">${gz(s.body)}</div>`+img+q;
  updateNav();
}
function pickReflect(b){
  b.parentNode.querySelectorAll('.ans').forEach(a=>a.classList.remove('sel'));
  b.classList.add('sel');answered[idx]=true;updateNav();
}

let gStep=0,gScore=0,gList=[];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderGame(el){
  gStep=0;gScore=0;
  gList=shuffle(GAME[LVL].slice()).slice(0,8); // 8 domande casuali, ordine mescolato
  el.innerHTML=`<div class="kicker"><span class="kdot">🎮</span>Gioco</div>
    <div class="title">Pilota o Motore?</div>
    <div class="body"><p>È una scelta del <strong>Pilota</strong> (saggio) o del <strong>Motore</strong> (impulsivo)? Tocca la risposta.</p></div>
    <div class="pm-leg"><div class="pm-c p">🧭 Pilota</div><div class="pm-c m">⚡ Motore</div></div>
    <div class="pm-score" id="pm-score"></div><div class="pm-item" id="pm-item"></div>
    <div class="pm-btns"><button class="bp" onclick="pmPick('P')">🧭 Pilota</button><button class="bm" onclick="pmPick('M')">⚡ Motore</button></div>
    <div class="pm-fb" id="pm-fb"></div>`;
  drawPm();
}
function drawPm(){
  document.getElementById('pm-score').textContent=gStep+' / '+gList.length;
  document.getElementById('pm-item').textContent=gz(gList[gStep].t);
  document.getElementById('pm-fb').textContent='';
}
function pmPick(v){
  const ok=gList[gStep].ans===v,fb=document.getElementById('pm-fb');
  if(ok){gScore++;fb.style.color='var(--g)';fb.textContent='✅ Giusto!';}
  else{fb.style.color='var(--r)';fb.textContent=gList[gStep].ans==='P'?'🧭 Era il Pilota':'⚡ Era il Motore';}
  gStep++;
  setTimeout(()=>{
    if(gStep<gList.length)drawPm();
    else{answered[idx]=true;
      document.getElementById('slide').innerHTML=
        `<div class="kicker"><span class="kdot">🏁</span>Fatto</div><div class="title">Gioco finito!</div>
         <div class="body"><span class="hl g" style="text-align:center;font-size:18px"><strong>${gScore} / ${gList.length}</strong> risposte giuste 🎯</span>
         <p>Riconoscere il Pilota e il Motore è il primo passo per far vincere quello giusto.</p></div>`;
      updateNav();}
  }, ok?480:1050);
}

function renderRecap(el,s){
  answered[idx]=true;
  el.innerHTML=`<div class="done">${s.emoji}</div>
    <div class="title" style="text-align:center">${gz(s.title)}</div>
    <div class="body"><p style="text-align:center;margin-bottom:14px">Ricapitoliamo:</p>
    <ul class="recap">${s.items.map(i=>`<li>${gz(i)}</li>`).join('')}</ul>
    <span class="hl">${gz(s.foot)}</span></div>`;
}

function updateNav(){
  const next=document.getElementById('next'),last=idx===DECK.length-1;
  next.textContent=last?'Fine · torna alla home':'Avanti';
}
function go(dir){
  if(dir>0){ if(idx===DECK.length-1){goHome();return;} idx++; }
  else{ if(idx===0)return; idx--; }
  render();
}
renderLessonList();
